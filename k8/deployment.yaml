apiVersion: apps/v1
kind: Deployment
metadata:
  name: meridian
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: meridian

  template:
    metadata:
      labels:
        app: meridian

    spec:
      containers:
        - name: meridian
          image: 386757865605.dkr.ecr.ap-south-1.amazonaws.com/meridian
          imagePullPolicy: Always

          ports:
            - containerPort: 80   

          readinessProbe:
            httpGet:
              path: /
              port: 80           
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80           
            initialDelaySeconds: 15
            periodSeconds: 10